<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Umpire Coder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: rgba(10, 12, 20, 0.97);
      overflow: hidden;
    }

    /* ── Panel (body acts as the panel) ── */

    body {
      width: 100%;
      background: rgba(10, 12, 20, 0.97);
      color: #e8eaf0;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: rgba(79, 124, 255, 0.08);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .title {
      font-size: 12px;
      font-weight: 700;
      color: #4f7cff;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .controls { display: flex; gap: 5px; }

    .ctrl {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45);
      border-radius: 5px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      padding: 0;
    }
    .ctrl:hover { border-color: #4f7cff; color: #4f7cff; }

    /* ── Body ── */

    .body {
      padding: 11px 13px 13px;
    }

    /* ── Timer ── */

    .timer {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 4px;
      color: #4f7cff;
      padding: 6px 0 6px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Stream delay ── */

    .delay-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 4px 0 6px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 2px;
    }

    .delay-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.35);
    }

    .delay-input {
      width: 52px;
      padding: 3px 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: #e8eaf0;
      font-size: 12px;
      font-family: inherit;
      text-align: center;
      font-variant-numeric: tabular-nums;
      -moz-appearance: textfield;
    }
    .delay-input::-webkit-outer-spin-button,
    .delay-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .delay-input:focus { outline: none; border-color: rgba(79,124,255,0.6); }

    .delay-unit {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
    }

    /* ── Labels ── */

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.3);
      margin: 9px 0 5px;
    }
    .optional { font-weight: 400; text-transform: none; letter-spacing: 0; }

    /* ── Umpires ── */

    .umpire-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .umpire-btn {
      padding: 7px 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      color: #c8cadb;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.15s;
    }
    .umpire-btn:hover { border-color: #4f7cff; color: #4f7cff; }
    .umpire-btn.active {
      background: rgba(79,124,255,0.18);
      border-color: #4f7cff;
      color: #4f7cff;
      font-weight: 700;
    }

    /* ── Tag grid ── */

    .tags-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 5px;
    }

    .tag-btn {
      padding: 6px 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      color: #9a9db8;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
      font-family: inherit;
    }
    .tag-btn:hover { background: rgba(255,255,255,0.08); color: #e8eaf0; }
    .tag-btn.active {
      background: rgba(79,124,255,0.14);
      border-color: #4f7cff;
      color: #7aa3ff;
      font-weight: 700;
    }

    .tag-btn[data-tag="Green Card"]         { border-color: rgba(45,206,137,0.25); }
    .tag-btn[data-tag="Green Card"].active  { background: rgba(45,206,137,0.14); border-color: #2dce89; color: #2dce89; }
    .tag-btn[data-tag="Yellow Card"]        { border-color: rgba(255,196,0,0.25); }
    .tag-btn[data-tag="Yellow Card"].active { background: rgba(255,196,0,0.14); border-color: #ffc400; color: #ffc400; }
    .tag-btn[data-tag="Red Card"]           { border-color: rgba(233,69,96,0.25); }
    .tag-btn[data-tag="Red Card"].active    { background: rgba(233,69,96,0.14); border-color: #e94560; color: #e94560; }

    /* ── Notes ── */

    textarea {
      width: 100%;
      padding: 7px 9px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      color: #e8eaf0;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: rgba(79,124,255,0.5); }
    textarea::placeholder { color: rgba(255,255,255,0.2); }

    /* ── Status flash ── */

    .status {
      min-height: 18px;
      font-size: 11px;
      text-align: center;
      margin: 6px 0 3px;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .status.success { color: #2dce89; background: rgba(45,206,137,0.1); }
    .status.error   { color: #e94560; background: rgba(233,69,96,0.1); }

    /* ── Actions ── */

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 7px;
    }

    .log-btn {
      padding: 9px;
      background: #4f7cff;
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .log-btn:hover { background: #6b93ff; }

    .end-btn {
      padding: 9px;
      background: transparent;
      border: 1px solid rgba(233,69,96,0.5);
      border-radius: 7px;
      color: #e94560;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .end-btn:hover:not(:disabled) { background: #e94560; color: #fff; border-color: #e94560; }
    .end-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── End-match confirm ── */

    .confirm-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(233,69,96,0.08);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 7px;
    }
    .confirm-row.hidden { display: none; }

    .confirm-label { font-size: 11px; color: #e94560; line-height: 1.3; }
    .abandon-warn  { color: #ffa040; }

    .end-choice-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .confirm-yes {
      padding: 5px 10px;
      background: #2dce89;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .confirm-yes:disabled { opacity: 0.6; cursor: not-allowed; }

    .abandon-btn {
      padding: 5px 10px;
      background: #e94560;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .abandon-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .confirm-no {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      align-self: flex-start;
    }
    .confirm-no:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    /* ── Thin mode ── */

    body.thin { width: 165px; }

    body.thin .timer {
      font-size: 22px;
      letter-spacing: 2px;
    }

    body.thin .umpire-row { grid-template-columns: 1fr; }
    body.thin .tags-grid  { grid-template-columns: 1fr; }
    body.thin .action-row { grid-template-columns: 1fr; }

    body.thin .delay-row { gap: 4px; }
    body.thin .delay-label { font-size: 9px; }

    /* ── Post-match screen ── */

    .post-header {
      font-size: 15px;
      font-weight: 800;
      color: #2dce89;
      text-align: center;
      padding: 8px 0 4px;
    }

    .post-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .post-hint code {
      font-family: monospace;
      background: rgba(255,255,255,0.08);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .post-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 5px;
    }

    .cmd-block {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 7px 9px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #a8d8ff;
      word-break: break-all;
      line-height: 1.5;
      user-select: text;
      margin-bottom: 5px;
    }

    .open-folder-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 7px;
      background: rgba(79,124,255,0.1);
      border: 1px solid rgba(79,124,255,0.3);
      border-radius: 5px;
      color: #4f7cff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .open-folder-btn:hover { background: rgba(79,124,255,0.25); }

    .post-status {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 6px;
      margin: 6px 0;
    }
    .post-status.error { color: #e94560; background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3); }

    .result-row {
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 5px;
      margin-bottom: 5px;
      line-height: 1.4;
    }
    .result-row.ok   { color: #2dce89; background: rgba(45,206,137,0.08); }
    .result-row.fail { color: #e94560; background: rgba(233,69,96,0.08); }

    .close-overlay-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .close-overlay-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <script src="overlay.js"></script>
</body>
</html>
